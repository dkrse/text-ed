<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#4834D4"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0D6FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="none" stroke="#A29BFE" stroke-width="2" opacity="0.4"/>

  <!-- Stylized E with cursor-like vertical bar -->
  <!-- Vertical bar (cursor) - slightly thinner, extends beyond E lines -->
  <rect x="148" y="108" width="28" height="296" rx="6" fill="url(#letter)"/>

  <!-- Top horizontal bar -->
  <rect x="176" y="108" width="180" height="28" rx="6" fill="url(#letter)"/>

  <!-- Middle horizontal bar (shorter) -->
  <rect x="176" y="242" width="140" height="28" rx="6" fill="url(#letter)"/>

  <!-- Bottom horizontal bar -->
  <rect x="176" y="376" width="180" height="28" rx="6" fill="url(#letter)"/>

  <!-- Blinking cursor line accent -->
  <rect x="364" y="100" width="4" height="48" rx="2" fill="#FD79A8" opacity="0.9"/>
</svg>
